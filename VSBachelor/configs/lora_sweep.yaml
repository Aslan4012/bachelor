program: src/lora/lora_sweep.py

method: bayes
run_cap: 100

# Choose ONE metric block depending on what you want to optimize.
# Option A — minimize reconstruction error (uncomment this, comment out option B):
# metric:
#   name: reconstruction_error
#   goal: minimize

# Option B — maximize MRR (uncomment this, comment out option A):
metric:
  name: mrr
  goal: maximize

parameters:
  rank:
    distribution: int_uniform
    min: 4
    max: 64

  lambda_B:
    distribution: log_uniform_values
    min: 1e-4
    max: 10.0

  lambda_C:
    distribution: log_uniform_values
    min: 1e-4
    max: 10.0

  t:
    distribution: int_uniform
    min: 50
    max: 1000

  tolerance:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-2
